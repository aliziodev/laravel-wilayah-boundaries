name: Sync Upstream Boundaries

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC setiap hari (30 menit setelah wilayah utama)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl

      - name: Cek hash upstream (branch main)
        id: check
        run: |
          UPSTREAM_HASH=$(curl -sf \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/cahyadsn/wilayah_boundaries/commits/main" \
            | jq -r '.sha')

          CURRENT_HASH=$(php -r "
            \$v = @include 'data/boundaries/version.php';
            echo \$v['source_hash'] ?? 'none';
          ")

          echo "upstream_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT
          echo "current_hash=$CURRENT_HASH"   >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_HASH" != "$CURRENT_HASH" ] && [ "$UPSTREAM_HASH" != "null" ]; then
            echo "changed=true"  >> $GITHUB_OUTPUT
            echo "📦 Boundaries berubah: $CURRENT_HASH → $UPSTREAM_HASH"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Boundaries sudah up-to-date."
          fi

      - name: Jalankan Normalizer Boundaries
        if: steps.check.outputs.changed == 'true'
        env:
          UPSTREAM_HASH: ${{ steps.check.outputs.upstream_hash }}
        run: |
          # Fetch langsung dari raw URL — tanpa git clone
          php .github/scripts/normalize.php \
            "https://raw.githubusercontent.com/cahyadsn/wilayah_boundaries/refs/heads/main/db"

      - name: Bump versi package
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          CURRENT=$(php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            echo \$c['version'] ?? '1.0.0';
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          php -r "
            \$c = json_decode(file_get_contents('composer.json'), true);
            \$c['version'] = '$NEW_VERSION';
            file_put_contents('composer.json', json_encode(\$c, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);
          "

      - name: Commit & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ composer.json
          git commit -m "data: sync boundaries $(date +%Y-%m-%d) [skip ci]

          Source: cahyadsn/wilayah_boundaries@${{ steps.check.outputs.upstream_hash }}"
          git push

      - name: Buat GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: "v${{ steps.version.outputs.new_version }} — Boundaries Sync $(date +%Y-%m-%d)"
          body: |
            ## 🗺 Update Data Batas Wilayah

            Sinkronisasi otomatis dari `cahyadsn/wilayah_boundaries`.

            **Source commit:** `${{ steps.check.outputs.upstream_hash }}`

            ### Update di project Anda:
            ```bash
            composer update aliziodev/laravel-wilayah-boundaries
            php artisan boundaries:sync
            php artisan boundaries:seed
            ```
